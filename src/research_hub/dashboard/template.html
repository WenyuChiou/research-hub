<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>research-hub dashboard</title>
  <style>{{ STYLE }}</style>
</head>
<body>
  <div class="app">
    <header class="app-header" role="banner">
      <h1>research-hub</h1>
      <p class="vault-meta">Vault: <code>{{ VAULT_ROOT }}</code> · Generated {{ GENERATED_AT }} · {{ PERSONA_LABEL }}</p>
      <input type="search" id="search-input" class="search-bar"
             placeholder="Search papers and clusters…"
             aria-label="Search papers and clusters">
    </header>
    <main role="main">
      {{ BODY }}
    </main>
    <footer>
      <p style="text-align:center;color:var(--fg-mute);font-size:11px;margin-top:32px;">
        Generated by <code>research-hub dashboard</code> · v0.9.0
      </p>
    </footer>
  </div>
  <script>
    const VAULT_DATA = {{ VAULT_DATA_JSON }};
    {{ SCRIPT }}
  </script>
</body>
</html>

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      # v0.65: validate the wheel actually installs + imports in a fresh
      # venv before uploading. Catches packaging bugs (missing module in
      # wheel, broken __version__, syntax error introduced post-CI) that
      # the test matrix can't see because tests run on the editable repo.
      # v0.68.3: also assert __version__ matches the git tag (drop the
      # leading 'v'). The drift check `tests/test_v068_3_version_sync.py`
      # catches mismatches between pyproject.toml and __init__.py at PR
      # time; this step catches mismatches between either of those and
      # the actual git tag at release time.
      - name: Validate wheel installs cleanly + version matches tag
        run: |
          python -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install --quiet dist/*.whl
          INSTALLED=$(/tmp/wheel_test/bin/python -c "import research_hub; print(research_hub.__version__)")
          /tmp/wheel_test/bin/python -c "from research_hub.cli import main"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Installed version: $INSTALLED"
          echo "Git tag (without v): $TAG_VERSION"
          if [ "$INSTALLED" != "$TAG_VERSION" ]; then
            echo "::error::Version drift: research_hub.__version__='$INSTALLED' but git tag is '$GITHUB_REF_NAME' ($TAG_VERSION)."
            echo "::error::Update src/research_hub/__init__.py and pyproject.toml to match the tag, then re-tag."
            exit 1
          fi

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # v0.60.1: --skip-existing so a re-run (or a version already uploaded
        # manually via PyPI) doesn't 400 the whole CI job. CI still surfaces
        # other failures (auth, malformed dist, etc.) normally.
        run: twine upload --skip-existing dist/*

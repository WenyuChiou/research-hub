name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      # v0.65: validate the wheel actually installs + imports in a fresh
      # venv before uploading. Catches packaging bugs (missing module in
      # wheel, broken __version__, syntax error introduced post-CI) that
      # the test matrix can't see because tests run on the editable repo.
      - name: Validate wheel installs cleanly
        run: |
          python -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install --quiet dist/*.whl
          /tmp/wheel_test/bin/python -c "import research_hub; print('research_hub', research_hub.__version__)"
          /tmp/wheel_test/bin/python -c "from research_hub.cli import main"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # v0.60.1: --skip-existing so a re-run (or a version already uploaded
        # manually via PyPI) doesn't 400 the whole CI job. CI still surfaces
        # other failures (auth, malformed dist, etc.) normally.
        run: twine upload --skip-existing dist/*

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Run tests
        run: pytest -q --maxfail=3 -m "not slow"

      - name: Coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: pytest --cov=research_hub --cov-report=term-missing -m "not slow"

  stress-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Run stress tests
        run: pytest tests/stress/ -v
        timeout-minutes: 10

# v0.95.0 W9 (G5 #19): automated dependency + Action update PRs.
# Complements the pip-audit CI step — dependabot opens the PR, the
# CI matrix (3.10–3.14 × 3 OS) + pytest gate it before merge.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group patch bumps so the upper-bounded deps don't open 7 PRs/week.
    groups:
      runtime-patches:
        update-types: ["patch"]
    labels:
      - "dependencies"
    ignore:
      # notebooklm-py is capped <0.5.0 ON PURPOSE (see pyproject.toml): a 0.x
      # minor-version kwarg drift shipped v0.88.10 "100% NLM upload broken".
      # Don't auto-widen the cap (PR #119 -> 0.6.0 failed the full CI matrix) —
      # raise it manually after validating a specific version + call sites.
      # Patch updates within 0.4.x still flow.
      - dependency-name: "notebooklm-py"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "ci"
